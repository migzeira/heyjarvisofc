version: "3.9"

services:
  evolution_api:
    image: atendai/evolution-api:latest
    container_name: mayachat_evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      # ── Servidor ──────────────────────────────────────
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_SERVER_URL}          # ex: https://evolution.seudominio.com

      # ── Autenticação ──────────────────────────────────
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY} # sua chave secreta
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: true

      # ── WhatsApp ──────────────────────────────────────
      WA_BUSINESS_TOKEN_WEBHOOK: ""
      WA_OFFICIAL_BUSINESS_ENABLED: false

      # ── Webhook para o Supabase ────────────────────────
      WEBHOOK_GLOBAL_URL: ${SUPABASE_WEBHOOK_URL}  # URL da Edge Function
      WEBHOOK_GLOBAL_ENABLED: true
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: false
      WEBHOOK_EVENTS_APPLICATION_STARTUP: false
      WEBHOOK_EVENTS_QRCODE_UPDATED: false
      WEBHOOK_EVENTS_MESSAGES_SET: false
      WEBHOOK_EVENTS_MESSAGES_UPSERT: true          # só mensagens recebidas
      WEBHOOK_EVENTS_MESSAGES_UPDATE: false
      WEBHOOK_EVENTS_MESSAGES_DELETE: false
      WEBHOOK_EVENTS_SEND_MESSAGE: false
      WEBHOOK_EVENTS_CONTACTS_SET: false
      WEBHOOK_EVENTS_CONTACTS_UPSERT: false
      WEBHOOK_EVENTS_CONTACTS_UPDATE: false
      WEBHOOK_EVENTS_PRESENCE_UPDATE: false
      WEBHOOK_EVENTS_CHATS_SET: false
      WEBHOOK_EVENTS_CHATS_UPSERT: false
      WEBHOOK_EVENTS_CHATS_UPDATE: false
      WEBHOOK_EVENTS_CHATS_DELETE: false
      WEBHOOK_EVENTS_GROUPS_UPSERT: false
      WEBHOOK_EVENTS_GROUPS_UPDATE: false
      WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE: false
      WEBHOOK_EVENTS_CONNECTION_UPDATE: false
      WEBHOOK_EVENTS_LABELS_EDIT: false
      WEBHOOK_EVENTS_LABELS_ASSOCIATION: false
      WEBHOOK_EVENTS_CALL: false
      WEBHOOK_EVENTS_NEW_JWT_TOKEN: false

      # ── Armazenamento ────────────────────────────────
      STORE_MESSAGES: false
      STORE_MESSAGE_UP: false
      STORE_CONTACTS: false
      STORE_CHATS: false
      CLEAN_STORE_CLEANING_INTERVAL: 7200
      CLEAN_STORE_MESSAGES: true
      CLEAN_STORE_MESSAGE_UP: true
      CLEAN_STORE_CONTACTS: true
      CLEAN_STORE_CHATS: true

      # ── Redis (opcional, recomendado em produção) ────
      REDIS_ENABLED: false
      # REDIS_URI: redis://redis:6379
      # REDIS_PREFIX_KEY: evolution

      # ── Banco de dados (SQLite por padrão) ───────────
      DATABASE_ENABLED: false

      # ── Logs ─────────────────────────────────────────
      LOG_LEVEL: ERROR
      LOG_COLOR: true
      LOG_BAILEYS: error

      # ── Configurações de sessão ───────────────────────
      DEL_INSTANCE: false
      DEL_TEMP_INSTANCES: true

    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store

volumes:
  evolution_instances:
  evolution_store:
